# tmux config — Phase 1 of the tmux migration (see repo tmux-migration-plan.md).
#
# SCOPE: only the cross-boundary <C-h/j/k/l> navigation between nvim windows
# and tmux panes (pairs with smart-splits.nvim). Sessions, status line, theme,
# prefix choice, and copy-mode/vi keys are deferred to later phases.
#
# Tradeoff: <C-h/j/k/l> are grabbed globally, so the Claude pane (and any other
# non-vim pane) can't use them for its own shortcuts (e.g. <C-l> clear-screen).

# Pass the key through when the focused pane is running (n)vim so smart-splits
# handles it; otherwise move between tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Keep the same navigation while in tmux copy-mode.
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
